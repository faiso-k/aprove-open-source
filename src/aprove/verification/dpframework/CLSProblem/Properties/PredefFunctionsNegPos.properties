<!-- FunctionSymbol -> Function -->
<!-- neg_int -->
    <entry key = "neg_int">
        [x]
        []
        neg_int(pos(x)) -> neg(x)
        neg_int(neg(x)) -> pos(x)
    </entry>
<!-- not -->
    <entry key = "not">
        [x]
        []
        not(pos(0)) -> pos(s(0))
        not(neg(0)) -> pos(s(0))
        not(pos(s(x))) -> pos(0)
        not(neg(s(x))) -> neg(0)
    </entry>
<!-- id -->
    <entry key = "id">
        [x]
        []
        id(x) -> x
    </entry>
<!-- plus_int -->
    <entry key = "plus_int">
        [x, y]
        [plus_nat / 2, minus_nat / 2]
        plus_int(pos(x),neg(y)) -> minus_nat(x,y)
        plus_int(neg(x),pos(y)) -> minus_nat(y,x)
        plus_int(neg(x),neg(y)) -> neg(plus_nat(x,y))
        plus_int(pos(x),pos(y)) -> pos(plus_nat(x,y))
    </entry>
<!-- and -->
    <entry key = "and">
        [x, y]
        []
        and(pos(s(x)),y) -> y
        and(neg(s(x)),y) -> y
        and(pos(0),y) -> pos(0)
        and(neg(0),y) -> neg(0)
        and(x,pos(s(y))) -> x
        and(x,neg(s(y))) -> x
        and(x,pos(0)) -> pos(0)
        and(x,neg(0)) -> neg(0)
    </entry>
<!-- equal_int -->
    <entry key = "equal_int">
        [x, y]
        []
        equal_int(pos(0), pos(0)) -> pos(s(0))
        equal_int(neg(0), pos(0)) -> pos(s(0))
        equal_int(neg(0), neg(0)) -> pos(s(0))
        equal_int(pos(0), neg(0)) -> pos(s(0))
        equal_int(pos(0), pos(s(y))) -> pos(0)
        equal_int(neg(0), pos(s(y))) -> pos(0)
        equal_int(pos(0), neg(s(y))) -> pos(0)
        equal_int(neg(0), neg(s(y))) -> pos(0)
        equal_int(pos(s(x)), pos(0)) -> pos(0)
        equal_int(pos(s(x)), neg(0)) -> pos(0)
        equal_int(neg(s(x)), pos(0)) -> pos(0)
        equal_int(neg(s(x)), neg(0)) -> pos(0)
        equal_int(pos(s(x)), neg(s(y))) -> pos(0)
        equal_int(neg(s(x)), pos(s(y))) -> pos(0)
        equal_int(pos(s(x)), pos(s(y))) -> equal_int(pos(x), pos(y))
        equal_int(neg(s(x)), neg(s(y))) -> equal_int(neg(x), neg(y))
    </entry>
<!-- greatereq_int -->
    <entry key = "greatereq_int">
        [x, y]
        []
        greatereq_int(pos(x), pos(0)) -> pos(s(0))
        greatereq_int(neg(0), pos(0)) -> pos(s(0))
        greatereq_int(neg(0), neg(y)) -> pos(s(0))
        greatereq_int(pos(x), neg(y)) -> pos(s(0))
        greatereq_int(pos(0), pos(s(y)) -> pos(0)
        greatereq_int(neg(x), pos(s(y))) -> pos(0)
        greatereq_int(neg(s(x)), pos(0)) -> pos(0)
        greatereq_int(neg(s(x)), neg(0)) -> pos(0)
        greatereq_int(pos(s(x)), pos(s(y))) -> greatereq_int(pos(x),pos(y))
        greatereq_int(neg(s(x)), neg(s(y))) -> greatereq_int(neg(x),neg(y))
    </entry>
<!-- greater_int -->
    <entry key = "greater_int">
        [x, y]
        []
        greater_int(pos(0), pos(0)) -> pos(0)
        greater_int(pos(0), neg(0)) -> pos(0)
        greater_int(neg(0), pos(0)) -> pos(0)
        greater_int(neg(0), neg(0)) -> pos(0)
        greater_int(pos(0), pos(s(y))) -> pos(0)
        greater_int(neg(0), pos(s(y))) -> pos(0)
        greater_int(pos(0), neg(s(y))) -> pos(s(0))
        greater_int(neg(0), neg(s(y))) -> pos(s(0))
        greater_int(pos(s(x)), pos(0)) -> pos(s(0))
        greater_int(neg(s(x)), pos(0)) -> pos(0)
        greater_int(pos(s(x)), neg(0)) -> pos(s(0))
        greater_int(neg(s(x)), neg(0)) -> pos(0)
        greater_int(pos(s(x)), neg(s(y))) -> pos(s(0))
        greater_int(neg(s(x)), pos(s(y))) -> pos(0)
        greater_int(pos(s(x)), pos(s(y))) -> greater_int(pos(x),pos(y))
        greater_int(neg(s(x)), neg(s(y))) -> greater_int(neg(x),neg(y))
    </entry>
<!-- lesseq_int -->
    <entry key = "lesseq_int">
        [x, y]
        []
        lesseq_int(pos(0), pos(y)) -> pos(s(0))
        lesseq_int(pos(0), neg(0)) -> pos(s(0))
        lesseq_int(neg(x), pos(y)) -> pos(s(0))
        lesseq_int(neg(x), neg(0)) -> pos(s(0))
        lesseq_int(pos(x), neg(s(y))) -> pos(0)
        lesseq_int(neg(0), neg(s(y))) -> pos(0)
        lesseq_int(pos(s(x)), pos(0)) -> pos(0)
        lesseq_int(pos(s(x)), neg(y)) -> pos(0)
        lesseq_int(pos(s(x)), pos(s(y))) -> lesseq_int(pos(x),pos(y))
        lesseq_int(neg(s(x)), neg(s(y))) -> lesseq_int(neg(x),neg(y))
    </entry>
<!-- less_int -->
    <entry key = "less_int">
        [x, y]
        []
        less_int(pos(0), pos(0)) -> pos(0)
        less_int(pos(0), neg(0)) -> pos(0)
        less_int(neg(0), pos(0)) -> pos(0)
        less_int(neg(0), neg(0)) -> pos(0)
        less_int(pos(0), pos(s(y))) -> pos(s(0))
        less_int(neg(0), pos(s(y))) -> pos(s(0))
        less_int(pos(0), neg(s(y))) -> pos(0)
        less_int(neg(0), neg(s(y))) -> pos(0)
        less_int(pos(s(x)), pos(0)) -> pos(0)
        less_int(neg(s(x)), pos(0)) -> pos(s(0))
        less_int(pos(s(x)), neg(0)) -> pos(0)
        less_int(neg(s(x)), neg(0)) -> pos(s(0))
        less_int(pos(s(x)), neg(s(y))) -> pos(0)
        less_int(neg(s(x)), pos(s(y))) -> pos(s(0))
        less_int(pos(s(x)), pos(s(y))) -> less_int(pos(x),pos(y))
        less_int(neg(s(x)), neg(s(y))) -> less_int(neg(x),neg(y))
    </entry>
<!-- div_int -->
    <entry key = "div_int">
        [x, y]
        [greatereq_int / 2]
        div_int(pos(x), pos(s(y))) -> pos(div_nat(x, s(y)))
        div_int(pos(x), neg(s(y))) -> neg(div_nat(x, s(y)))
        div_int(neg(x), pos(s(y))) -> neg(div_nat(x, s(y)))
        div_int(neg(x), neg(s(y))) -> pos(div_nat(x, s(y)))
        div_nat(0, s(y)) -> 0
        div_nat(s(x), s(y)) -> div_nat2(greatereq_int(pos(x), pos(y)), div_nat(minus_nat_s(x, y), s(y)), 0)
        div_nat2(true, x, y) -> x
        div_nat2(false, x, y) -> y
        minus_nat_s(x,0) -> x
        minus_nat_s(0,s(y)) -> 0
        minus_nat_s(s(x),s(y)) -> minus_nat_s(x,y)
    </entry>
<!-- mult_int -->
    <entry key = "mult_int">
        [x, y]
        [mult_nat / 2]
        mult_int(pos(x),pos(y)) -> pos(mult_nat(x,y))
        mult_int(pos(x),neg(y)) -> neg(mult_nat(x,y))
        mult_int(neg(x),pos(y)) -> neg(mult_nat(x,y))
        mult_int(neg(x),neg(y)) -> pos(mult_nat(x,y))
    </entry>
<!-- or -->
    <entry key = "or">
        [x,y]
        []
        or(pos(s(x)),y) -> pos(s(0))
        or(neg(s(x)),y) -> pos(s(0))
        or(pos(0),y) -> y
        or(neg(0),y) -> y
        or(x,pos(s(x))) -> pos(s(0))
        or(x,neg(s(x))) -> pos(s(0))
        or(x,pos(0)) -> x
        or(x,neg(0)) -> x
    </entry>
<!-- mod_int -->
    <entry key = "mod_int">
        [x, y]
        [greatereq_int / 2, neg_int / 1]
        mod_int(0,x) -> 0
        mod_int(s(x),s(y)) -> mod2_int(greatereq_int(s(x),s(y)),s(x),s(y))
        mod_int(s(x),p(y)) -> mod_int(s(x),neg_int(p(y)))
        mod_int(p(x),s(y)) -> neg_int(mod_int(neg_int(p(x)),s(y)))
        mod_int(p(x),p(y)) -> neg_int(mod_int(neg_int(p(x)),neg_int(p(y))))
        mod2_int(true,s(x),s(y)) -> mod_int(modminus(x,y),s(y))
        mod2_int(false,s(x),s(y)) -> s(x)
        modminus(s(x),s(y)) -> modminus(x,y)
        modminus(s(x),0) -> s(x)
        modminus(0,0) -> 0
    </entry>
<!-- notequal_int -->
    <entry key = "notequal_int">
        [x, y]
        []
        notequal_int(pos(0), pos(0)) -> pos(0)
        notequal_int(neg(0), pos(0)) -> pos(0)
        notequal_int(neg(0), neg(0)) -> pos(0)
        notequal_int(pos(0), neg(0)) -> pos(0)
        notequal_int(pos(0), pos(s(y))) -> pos(s(0))
        notequal_int(neg(0), pos(s(y))) -> pos(s(0))
        notequal_int(pos(0), neg(s(y))) -> pos(s(0))
        notequal_int(neg(0), neg(s(y))) -> pos(s(0))
        notequal_int(pos(s(x)), pos(0)) -> pos(s(0))
        notequal_int(pos(s(x)), neg(0)) -> pos(s(0))
        notequal_int(neg(s(x)), pos(0)) -> pos(s(0))
        notequal_int(neg(s(x)), neg(0)) -> pos(s(0))
        notequal_int(pos(s(x)), neg(s(y))) -> pos(s(0))
        notequal_int(neg(s(x)), pos(s(y))) -> pos(s(0))
        notequal_int(pos(s(x)), pos(s(y))) -> notequal_int(pos(x), pos(y))
        notequal_int(neg(s(x)), neg(s(y))) -> notequal_int(neg(x), neg(y))
    </entry>
<!-- shl_int -->
    <entry key = "shl_int">
        [x, y]
        []
        shl_int(pos(x),pos(y)) -> pos(shl_nat(x,y))
        shl_int(pos(x),neg(y)) -> pos(shr_nat(x,y))
        shl_int(neg(x),pos(y)) -> neg(shl_nat(x,y))
        shl_int(neg(x),neg(y)) -> neg(shr_nat(x,y))
    </entry>
<!-- shr_int -->
    <entry key = "shr_int">
        [x, y]
        []
        shr_int(pos(x),pos(y)) -> pos(shr_nat(x,y))
        shr_int(pos(x),neg(y)) -> pos(shl_nat(x,y))
        shr_int(neg(x),pos(y)) -> neg(shr_nat(x,y))
        shr_int(neg(x),neg(y)) -> neg(shl_nat(x,y))
    </entry>
<!-- minus_int -->
    <entry key = "minus_int">
        [x, y]
        [plus_nat / 2, minus_nat / 2]
        minus_int(pos(x),neg(y)) -> pos(plus_nat(x,y))
        minus_int(neg(x),pos(y)) -> neg(plus_nat(x,y))
        minus_int(neg(x),neg(y)) -> minus_nat(y,x)
        minus_int(pos(x),pos(y)) -> minus_nat(x,y)
    </entry>
<!-- xor -->
    <entry key = "xor">
        [x, y]
        []
        xor(pos(s(x)),y) -> not(y)
        xor(neg(s(x)),y) -> not(y)
        xor(pos(0),y) -> y
        xor(neg(0),y) -> y
        xor(x,pos(s(x))) -> not(x)
        xor(x,neg(s(x))) -> not(x)
        xor(x,pos(0)) -> x
        xor(x,neg(0)) -> x
    </entry>

<!-- auxiliary definitions -->
<!-- plus_nat -->
    <entry key = "plus_nat">
        [x, y]
        []
        plus_nat(0,x) -> x
        plus_nat(x,0) -> x
        plus_nat(s(x),y) -> s(plus_nat(x,y))
    </entry>
<!-- minus_nat -->
    <entry key ="minus_nat">
        [x, y]
        []
        minus_nat(0,0) -> pos(0)
        minus_nat(0,s(y)) -> neg(s(y))
        minus_nat(s(x),0) -> pos(s(x))
        minus_nat(s(x),s(y)) -> minus_nat(x,y)
    </entry>
<!-- mult_nat -->
    <entry key = "mult_nat">
        [x, y]
        [plus_nat / 2]
        mult_nat(0,y) -> 0
        mult_nat(x,0) -> 0
        mult_nat(s(x),s(y)) -> plus_nat(mult_nat(x,s(y)),s(y))
    </entry>
<!-- shl_nat -->
    <entry key = "shl_nat">
        [x, y]
        [double_nat / 1]
        shl_nat(x,0) -> x
        shl_nat(x,s(y)) -> shl_nat(double_nat(x),y)
    </entry>
<!-- double_nat -->
    <entry key = "double_nat">
        [x]
        []
        double_nat(0) -> 0
        double_nat(s(x)) -> s(s(double_nat(x)))
    </entry>
<!-- shr_nat -->
    <entry key = "shr_nat">
        [x, y]
        [half_nat / 1]
        shr_nat(x,0) -> x
        shr_nat(x,s(y)) -> shr_nat(half_nat(x),y)
    </entry>
<!-- half_nat -->
    <entry key = "half_nat">
        [x]
        []
        half_nat(0) -> 0
        half_nat(s(0)) -> 0
        half_nat(s(s(x))) -> s(half_nat(x))
    </entry>
</properties>
