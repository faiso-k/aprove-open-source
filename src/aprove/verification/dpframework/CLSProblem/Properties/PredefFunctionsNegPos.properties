<?xml version="1.0" encoding="UTF-8"?>
<!-- !!! DO NOT MODIFY THE KEYS !!! -->
<!-- !!! do not modify the order of defined function symbols for every Clousot name -->
<!DOCTYPE properties SYSTEM "http://java.sun.com/dtd/properties.dtd">
<properties>

<!-- 0, neg, pos, -->
    <entry key = "0">
        0
    </entry>
    <entry key = "neg">
        neg
    </entry>
    <entry key = "pos">
        pos
    </entry>
    <entry key = "s">
        s
    </entry>
