<?xml version="1.0" encoding="UTF-8"?>
<!-- !!! DO NOT MODIFY THE KEYS !!! -->
<!-- !!! do not modify the order of defined function symbols for every ITRS name -->
<!DOCTYPE properties SYSTEM "http://java.sun.com/dtd/properties.dtd">
<properties>

<!-- FORMAT:                                                             -->
<!-- The key for each entry refers to a function symbol and has the     -->
<!-- form "name/arity". For each function symbol to translate, there is -->
<!-- a entry whose value is the key of the function symbol which        -->
<!-- replaces the original function symbol.                             -->
<!--                                                                    -->
<!-- For the replacing function symbols, the first line declares the    -->
<!-- variable symbols, the second line declares the functions referenced-->
<!-- by the rules for this function symbol. The other lines define the  -->
<!-- the rules for this function symbol.                                -->

 <!-- ITRS name -> FunctionSymbol -->
    <!-- we introduce new symbols for TRUE and FALSE here, so mapTermFreshnames -->
    <!-- does the right thing, by replacing all instances of true/false on      -->
    <!-- on conflicts instead of only these instances introduced by the rules   -->
    <!-- in this file                                                           -->
    <entry key = "TRUE@Booleans/0">
        true/0
    </entry>
    <entry key = "FALSE@Booleans/0">
        false/0
    </entry>
    <entry key = "-@int/1">
        neg_int/1
    </entry>
    <entry key = "-@int@int/2">
        minus_int/2
    </entry>
    <entry key = "!@Booleans/1">
        not/1
    </entry>
    <entry key = "+@int@int/2">
        plus_int/2
    </entry>
    <entry key = "&amp;&amp;@Booleans@Booleans/2">
        and/2
    </entry>
    <entry key = "=@int@int/2">
        equal_int/2
    </entry>
    <entry key = "!=@int@int/2">
        not_equal_int/2
    </entry>
    <entry key = "&gt;=@int@int/2">
        greatereq_int/2
    </entry>
    <entry key = "&gt;@int@int/2">
        greater_int/2
    </entry>
    <entry key = "&lt;=@int@int/2">
        lesseq_int/2
    </entry>
    <entry key = "&lt;@int@int/2">
        less_int/2
    </entry>
    <entry key = "/@int@int/2">
        div_int/2
    </entry>
    <entry key = "*@int@int/2">
        mult_int/2
    </entry>
    <entry key = "%@int@int/2">
        mod_int/2
    </entry>
    <entry key = "||@Booleans@Booleans/2">
        or/2
    </entry>
<!-- FunctionSymbol -> Function -->
<!-- neg_int -->
    <entry key = "true/0">
        []
        []
    </entry>
    <entry key = "false/0">
        []
        []
    </entry>
    <entry key = "neg_int/1">
        [x]
        []
        neg_int(pos(x)) -> neg(x)
        neg_int(neg(x)) -> pos(x)
    </entry>
<!-- not -->
    <entry key = "not/1">
        []
        []
        not(true) -> false
        not(false) -> true
    </entry>
<!-- plus_int -->
    <entry key = "plus_int/2">
        [x, y]
        [plus_nat/2, minus_nat/2]
        plus_int(pos(x),neg(y)) -> minus_nat(x,y)
        plus_int(neg(x),pos(y)) -> minus_nat(y,x)
        plus_int(neg(x),neg(y)) -> neg(plus_nat(x,y))
        plus_int(pos(x),pos(y)) -> pos(plus_nat(x,y))
    </entry>
<!-- minus_int -->
    <entry key = "minus_int/2">
        [x, y]
        [plus_nat/2, minus_nat/2]
        minus_int(pos(x),pos(y)) -> minus_nat(x,y)
        minus_int(neg(x),neg(y)) -> minus_nat(y,x)
        minus_int(neg(x),pos(y)) -> neg(plus_nat(x,y))
        minus_int(pos(x),neg(y)) -> pos(plus_nat(x,y))
    </entry>
<!-- and -->
    <entry key = "and/2">
        []
        []
        and(false, false) -> false
        and(false, true) -> false
        and(true, false) -> false
        and(true, true) -> true
    </entry>
<!-- equal_int -->
    <entry key = "equal_int/2">
        [x, y]
        []
        equal_int(pos(0), pos(0)) -> true
        equal_int(neg(0), pos(0)) -> true
        equal_int(neg(0), neg(0)) -> true
        equal_int(pos(0), neg(0)) -> true
        equal_int(pos(0), pos(s(y))) -> false
        equal_int(neg(0), pos(s(y))) -> false
        equal_int(pos(0), neg(s(y))) -> false
        equal_int(neg(0), neg(s(y))) -> false
        equal_int(pos(s(x)), pos(0)) -> false
        equal_int(pos(s(x)), neg(0)) -> false
        equal_int(neg(s(x)), pos(0)) -> false
        equal_int(neg(s(x)), neg(0)) -> false
        equal_int(pos(s(x)), neg(s(y))) -> false
        equal_int(neg(s(x)), pos(s(y))) -> false
        equal_int(pos(s(x)), pos(s(y))) -> equal_int(pos(x), pos(y))
        equal_int(neg(s(x)), neg(s(y))) -> equal_int(neg(x), neg(y))
    </entry>
<!-- not_equal_int -->
    <entry key = "not_equal_int/2">
        [x, y]
        [or/2, greater_int/2]
        not_equal_int(x, y) -> or(greater_int(x, y), greater_int(y, x))
    </entry>
<!-- greatereq_int -->
    <entry key = "greatereq_int/2">
        [x, y]
        []
        greatereq_int(pos(x), pos(0)) -> true
        greatereq_int(neg(0), pos(0)) -> true
        greatereq_int(neg(0), neg(y)) -> true
        greatereq_int(pos(x), neg(y)) -> true
        greatereq_int(pos(0), pos(s(y))) -> false
        greatereq_int(neg(x), pos(s(y))) -> false
        greatereq_int(neg(s(x)), pos(0)) -> false
        greatereq_int(neg(s(x)), neg(0)) -> false
        greatereq_int(pos(s(x)), pos(s(y))) -> greatereq_int(pos(x),pos(y))
        greatereq_int(neg(s(x)), neg(s(y))) -> greatereq_int(neg(x),neg(y))
    </entry>
<!-- greater_int -->
    <entry key = "greater_int/2">
        [x, y]
        []
        greater_int(pos(0), pos(0)) -> false
        greater_int(pos(0), neg(0)) -> false
        greater_int(neg(0), pos(0)) -> false
        greater_int(neg(0), neg(0)) -> false
        greater_int(pos(0), pos(s(y))) -> false
        greater_int(neg(0), pos(s(y))) -> false
        greater_int(pos(0), neg(s(y))) -> true
        greater_int(neg(0), neg(s(y))) -> true
        greater_int(pos(s(x)), pos(0)) -> true
        greater_int(neg(s(x)), pos(0)) -> false
        greater_int(pos(s(x)), neg(0)) -> true
        greater_int(neg(s(x)), neg(0)) -> false
        greater_int(pos(s(x)), neg(s(y))) -> true
        greater_int(neg(s(x)), pos(s(y))) -> false
        greater_int(pos(s(x)), pos(s(y))) -> greater_int(pos(x),pos(y))
        greater_int(neg(s(x)), neg(s(y))) -> greater_int(neg(x),neg(y))
    </entry>
<!-- lesseq_int -->
    <entry key = "lesseq_int/2">
        [x, y]
        []
        lesseq_int(pos(0), pos(y)) -> true
        lesseq_int(pos(0), neg(0)) -> true
        lesseq_int(neg(x), pos(y)) -> true
        lesseq_int(neg(x), neg(0)) -> true
        lesseq_int(pos(0), neg(s(y))) -> false
        lesseq_int(neg(0), neg(s(y))) -> false
        lesseq_int(pos(s(x)), pos(0)) -> false
        lesseq_int(pos(s(x)), neg(y)) -> false
        lesseq_int(pos(s(x)), pos(s(y))) -> lesseq_int(pos(x),pos(y))
        lesseq_int(neg(s(x)), neg(s(y))) -> lesseq_int(neg(x),neg(y))
    </entry>
<!-- less_int -->
    <entry key = "less_int/2">
        [x, y]
        []
        less_int(pos(0), pos(0)) -> false
        less_int(pos(0), neg(0)) -> false
        less_int(neg(0), pos(0)) -> false
        less_int(neg(0), neg(0)) -> false
        less_int(pos(0), pos(s(y))) -> true
        less_int(neg(0), pos(s(y))) -> true
        less_int(pos(0), neg(s(y))) -> false
        less_int(neg(0), neg(s(y))) -> false
        less_int(pos(s(x)), pos(0)) -> false
        less_int(neg(s(x)), pos(0)) -> true
        less_int(pos(s(x)), neg(0)) -> false
        less_int(neg(s(x)), neg(0)) -> true
        less_int(pos(s(x)), neg(s(y))) -> false
        less_int(neg(s(x)), pos(s(y))) -> true
        less_int(pos(s(x)), pos(s(y))) -> less_int(pos(x),pos(y))
        less_int(neg(s(x)), neg(s(y))) -> less_int(neg(x),neg(y))
    </entry>
<!-- div_int -->
    <entry key = "div_int/2">
        [x, y]
        [greatereq_int/2, if/3, minus_nat_s/2]
        div_int(pos(x), pos(s(y))) -> pos(div_nat(x, s(y)))
        div_int(pos(x), neg(s(y))) -> neg(div_nat(x, s(y)))
        div_int(neg(x), pos(s(y))) -> neg(div_nat(x, s(y)))
        div_int(neg(x), neg(s(y))) -> pos(div_nat(x, s(y)))
        div_nat(0, s(y)) -> 0
        div_nat(s(x), s(y)) -> if(greatereq_int(pos(x), pos(y)), s(div_nat(minus_nat_s(x, y), s(y))), 0)
    </entry>
<!-- mult_int -->
    <entry key = "mult_int/2">
        [x, y]
        [mult_nat/2]
        mult_int(pos(x),pos(y)) -> pos(mult_nat(x,y))
        mult_int(pos(x),neg(y)) -> neg(mult_nat(x,y))
        mult_int(neg(x),pos(y)) -> neg(mult_nat(x,y))
        mult_int(neg(x),neg(y)) -> pos(mult_nat(x,y))
    </entry>
<!-- mod_int -->
    <entry key = "mod_int/2">
        [x, y]
        [greatereq_int/2, if/3, minus_nat_s/2]
        mod_int(pos(x), pos(y)) -> pos(mod_nat(x, y))
        mod_int(pos(x), neg(y)) -> pos(mod_nat(x, y))
        mod_int(neg(x), pos(y)) -> neg(mod_nat(x, y))
        mod_int(neg(x), neg(y)) -> neg(mod_nat(x, y))
        mod_nat(0, s(x)) -> 0
        mod_nat(s(x), s(y)) -> if(greatereq_int(pos(x), pos(y)), mod_nat(minus_nat_s(x, y), s(y)), s(x))
    </entry>
<!-- or -->
    <entry key = "or/2">
        []
        []
        or(false,false) -> false
        or(false,true) -> true
        or(true,false) -> true
        or(true,true) -> true
    </entry>

<!-- auxiliary definitions -->
<!-- plus_nat -->
    <entry key = "plus_nat/2">
        [x, y]
        []
        plus_nat(0,x) -> x
        plus_nat(s(x),y) -> s(plus_nat(x,y))
    </entry>
<!-- minus_nat -->
    <entry key ="minus_nat/2">
        [x, y]
        []
        minus_nat(0,0) -> pos(0)
        minus_nat(0,s(y)) -> neg(s(y))
        minus_nat(s(x),0) -> pos(s(x))
        minus_nat(s(x),s(y)) -> minus_nat(x,y)
    </entry>
<!-- minus_nat_s -->
    <entry key = "minus_nat_s/2">
        [x, y]
        []
        minus_nat_s(x,0) -> x
        minus_nat_s(0,s(y)) -> 0
        minus_nat_s(s(x),s(y)) -> minus_nat_s(x,y)
    </entry>
<!-- mult_nat -->
    <entry key = "mult_nat/2">
        [x, y]
        [plus_nat/2]
        mult_nat(0,y) -> 0
        mult_nat(s(x),0) -> 0
        mult_nat(s(x),s(y)) -> plus_nat(mult_nat(x,s(y)),s(y))
    </entry>
<!-- if -->
    <entry key = "if/3">
        [x,y]
        []
        if(true,x,y) -> x
        if(false,x,y) -> y
    </entry>
</properties>
